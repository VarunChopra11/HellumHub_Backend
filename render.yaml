services:
  - type: web
    name: ota-backend
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: ota-backend
      - key: ENVIRONMENT
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: ota
      - key: GRIDFS_BUCKET_NAME
        value: firmware
      - key: ADMIN_API_KEY
        sync: false
      - key: SIGNED_URL_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CHECK_RATE_LIMIT
        value: 60/minute
