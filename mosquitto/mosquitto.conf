# =============================================================================
# Mosquitto Configuration — api.hellum.dev
# =============================================================================
# Two listeners:
#   1883 — Plain MQTT, bound to 0.0.0.0 within the Docker network.
#           Used by the FastAPI app to publish commands (no TLS overhead).
#   8883 — MQTTS (TLS), bound to all interfaces for external ESP32 devices.
# =============================================================================

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ---------------------------------------------------------------------------
# Listener 1: Plain MQTT — internal Docker network only (FastAPI → Broker)
# ---------------------------------------------------------------------------
listener 1883
# Bind to all addresses so the 'api' Docker service can reach it by hostname.
# Access is restricted at the Docker network level; this port is NOT published
# to the host's external network interface in production.
bind_address 0.0.0.0
protocol mqtt

# Allow the API service to connect without a password on the internal port.
# NOTE: Lock this down with a dedicated internal ACL file if your threat model
#       requires it. For a private Docker bridge network this is acceptable.
allow_anonymous true

# ---------------------------------------------------------------------------
# Listener 2: MQTTS — external (ESP32 devices connect here)
# ---------------------------------------------------------------------------
listener 8883
protocol mqtt

# TLS — Let's Encrypt certificates (Certbot auto-renewed on host).
# These paths are volume-mounted read-only from the host into the container.
cafile   /etc/letsencrypt/live/api.hellum.dev/chain.pem
certfile /etc/letsencrypt/live/api.hellum.dev/fullchain.pem
keyfile  /etc/letsencrypt/live/api.hellum.dev/privkey.pem

# Require TLS 1.2+
tls_version tlsv1.2

# Authentication: require username/password for all ESP32 devices.
allow_anonymous false
password_file /mosquitto/config/passwd

# ---------------------------------------------------------------------------
# Topic Access Control (ACL)
# ---------------------------------------------------------------------------
# ESP32 devices should only publish to their own /state topic and subscribe
# to their own /cmd topic. If you want fine-grained per-device ACLs, replace
# the password_file above with an ACL file approach.
#
# Example ACL file entry (mosquitto/acl):
#   user esp32_aabbccddeeff
#   topic write smarthome/device/aabbccddeeff/state
#   topic read  smarthome/device/aabbccddeeff/cmd
#
# acl_file /mosquitto/config/acl




# Listener 3: WebSockets (For local React frontend testing)
# ---------------------------------------------------------------------------
listener 8083
protocol websockets
allow_anonymous true
